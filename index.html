<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Shanghao Wu</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <nav class="nav">
    <a href="index.html" aria-current="page">Home</a>
    <a href="about.html">About</a>
    <a href="coursework.html">Coursework</a>
    <a href="contact.html">Contact</a>
  </nav>

  <main class="hero">
    <div class="inner center">
      <h1 class="title">Shanghao Wu</h1>
      <p class="motto">“Life is simple, it's just not easy.”</p>
    </div>
  </main>
  <script>
  (function(){
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let w, h, particles;
    const COUNT = 80;
    const MAX_DIST = 150;

    function resize(){
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }

    function createParticles(){
      particles = [];
      for(let i = 0; i < COUNT; i++){
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.6,
          vy: (Math.random() - 0.5) * 0.6,
          r: Math.random() * 2 + 1
        });
      }
    }

    function draw(){
      ctx.clearRect(0, 0, w, h);
      for(let i = 0; i < COUNT; i++){
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        if(p.x < 0) p.x = w;
        if(p.x > w) p.x = 0;
        if(p.y < 0) p.y = h;
        if(p.y > h) p.y = 0;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(200,210,230,0.5)';
        ctx.fill();

        for(let j = i + 1; j < COUNT; j++){
          const q = particles[j];
          const dx = p.x - q.x;
          const dy = p.y - q.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if(dist < MAX_DIST){
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(q.x, q.y);
            ctx.strokeStyle = 'rgba(100,140,200,' + (1 - dist/MAX_DIST) * 0.3 + ')';
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', function(){ resize(); createParticles(); });
    resize();
    createParticles();
    draw();
  })();
  </script>
</body>
</html>
