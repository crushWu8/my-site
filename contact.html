  <script type="module">
    import { animate } from "https://cdn.jsdelivr.net/npm/motion@10.16.4/+esm";

    const blink = () => {
      const L = document.getElementById("eyeL");
      const R = document.getElementById("eyeR");
      if (L && R) animate([L, R], { opacity: [1, 0.25, 1] }, { duration: 1.9 });
    };
    const lookAround = () => {
      const kao = document.getElementById("kaomoji");
      const L = document.getElementById("eyeL");
      const R = document.getElementById("eyeR");
      if (L && R) animate([L, R], { x: [0, 4, -4, 0] }, { duration: 2 });
      if (kao) setTimeout(() => animate(kao, { x: [0, 8, -8, 0] }, { duration: 2.1 }), 100);
    };
    const cycle = () => { blink(); setTimeout(lookAround, 2000); };
    cycle(); setInterval(cycle, 8000);
  </script>

  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <script>
    fetch('https://site-stats.crushwu8.workers.dev/api/track').catch(() => {});

    google.charts.load('current', { packages: ['geochart'] });
    google.charts.setOnLoadCallback(async () => {
      const countEl = document.querySelector('.visitors-count');
      const wrap = document.getElementById('geochart');
      let chart, table;

      const draw = () => {
        const w = wrap.clientWidth;
        chart.draw(table, {
          displayMode: 'markers',
          projection: 'mercator',
          backgroundColor: { fill: 'transparent' },
          datalessRegionColor: '#3a4458',
          defaultColor: '#3a4458',
          colorAxis: { colors: ['#3b82f6', '#3b82f6'] },
          sizeAxis: { minValue: 1, minSize: 8, maxSize: 18 },
          legend: 'none',
          magnifyingGlass: { enable: false },
          width: w,
          height: w * 397 / 800,
        });
      };

      const tip = document.createElement('div');
      tip.className = 'visitor-tip';
      document.body.appendChild(tip);
      let mouseX = 0, mouseY = 0;
      const positionTip = () => {
        tip.style.left = (mouseX + 14) + 'px';
        tip.style.top = (mouseY - 36) + 'px';
      };
      document.addEventListener('mousemove', e => {
        mouseX = e.pageX;
        mouseY = e.pageY;
        if (tip.style.display === 'block') positionTip();
      });

      try {
        const res = await fetch('https://site-stats.crushwu8.workers.dev/api/stats');
        const data = await res.json();
        const cities = data.cities || [];
        const n = cities.length;
        countEl.textContent =
          `${data.total} total ${data.total === 1 ? 'visit' : 'visits'} from ${n} ${n === 1 ? 'city' : 'cities'}`;

        const rows = n > 0
          ? cities.map(c => [c.lat, c.lon, c.count])
          : [[0, 0, 0]];
        table = google.visualization.arrayToDataTable([['Lat', 'Long', 'Visits'], ...rows]);
        chart = new google.visualization.GeoChart(wrap);
        draw();

        google.visualization.events.addListener(chart, 'onmouseover', e => {
          if (e.row == null || n === 0) return;
          const c = cities[e.row];
          tip.textContent = `${c.city}, ${c.country} · ${c.count} ${c.count === 1 ? 'visit' : 'visits'}`;
          positionTip();
          tip.style.display = 'block';
        });
        google.visualization.events.addListener(chart, 'onmouseout', () => {
          tip.style.display = 'none';
        });

        let raf;
        window.addEventListener('resize', () => {
          cancelAnimationFrame(raf);
          raf = requestAnimationFrame(draw);
        });
      } catch (e) {
        countEl.textContent = 'Visitor stats unavailable';
      }
    });
  </script>
</body>
</html>
